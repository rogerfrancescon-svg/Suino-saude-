<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    
    <!-- Shield Outline -->
    <linearGradient id="shield-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>

    <!-- Pig Pink -->
    <linearGradient id="pig-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCA5A5" />
      <stop offset="100%" stop-color="#F87171" />
    </linearGradient>
    
    <!-- Snout Pink -->
    <linearGradient id="snout-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F87171" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>

    <!-- Medical Green Accent -->
    <linearGradient id="medical-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  
  <!-- Outer Shield -->
  <path d="M256,60 C256,60 110,95 80,140 C80,280 110,380 256,460 C402,380 432,280 432,140 C402,95 256,60 256,60 Z" fill="#1E293B" stroke="url(#shield-stroke)" stroke-width="16" stroke-linejoin="round" />

  <!-- Pig Ears -->
  <path d="M150,160 L180,220 L230,220 Z" fill="url(#snout-pink)" />
  <path d="M362,160 L332,220 L282,220 Z" fill="url(#snout-pink)" />
  
  <!-- Pig Face (Circle/Oval) -->
  <ellipse cx="256" cy="270" rx="110" ry="100" fill="url(#pig-pink)" />
  
  <!-- Snout -->
  <ellipse cx="256" cy="295" rx="45" ry="35" fill="url(#snout-pink)" />
  
  <!-- Nostrils -->
  <ellipse cx="236" cy="295" rx="10" ry="12" fill="#7F1D1D" />
  <ellipse cx="276" cy="295" rx="10" ry="12" fill="#7F1D1D" />
  
  <!-- Eyes -->
  <circle cx="210" cy="235" r="12" fill="#7F1D1D" />
  <circle cx="302" cy="235" r="12" fill="#7F1D1D" />

  <!-- Medical Cross Bottom/Top -->
  <path d="M256,120 L256,160 M236,140 L276,140" stroke="url(#medical-green)" stroke-width="16" stroke-linecap="round" />

</svg>
